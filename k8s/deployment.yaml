# Deploy after API is ready (replaces job.yaml)
# Switch: kubectl delete -f k8s/job.yaml
#         kubectl apply -f k8s/deployment.yaml k8s/service.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuro-sim
  namespace: neuro-sim
spec:
  replicas: 1   # kubectl scale deployment neuro-sim --replicas=3 -n neuro-sim
  selector:
    matchLabels:
      app: neuro-sim
  template:
    metadata:
      labels:
        app: neuro-sim
    spec:
      containers:
        - name: neuro-sim
          image: neuro-sim:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: logs
              mountPath: /data/logs
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: neuro-sim-logs
